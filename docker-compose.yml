services:
  # Санскрит многоагентный бот
  sanskrit_bot:
    build: .
    container_name: sanskrit_mas_bot
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    tty: true
    stdin_open: true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bot_network

  # База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: sanskrit_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-sanskrit_tutor}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sanskrit_tutor}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  postgres_data: